name: Run Supabase Migrations

on:
  # develop→staging / main→prod。migration を push したら自動適用。
  push:
    branches:
      - develop
      - main
    paths:
      - "supabase/migrations/**"
  # 手動トリガー（保険）。初回 cutover や再適用で push に乗らないケース用に、
  # GitHub UI → Actions → Run workflow で main を指定すれば手動でも流せる。
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "project_ref=${{ secrets.SUPABASE_PROJECT_REF_PRD }}" >> "$GITHUB_OUTPUT"
            echo "db_password=${{ secrets.SUPABASE_DB_PASSWORD_PRD }}" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "project_ref=${{ secrets.SUPABASE_PROJECT_REF_STG }}" >> "$GITHUB_OUTPUT"
            echo "db_password=${{ secrets.SUPABASE_DB_PASSWORD_STG }}" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          fi

      # Secrets 未設定で緑のまま素通り（=本番未適用に気付けない）するのを防ぐため、
      # skip(exit 0) ではなく fail(exit 1) で止める。
      - name: Fail if secrets not configured
        if: steps.env.outputs.project_ref == ''
        run: |
          echo "::error::Migration secrets not configured for ${{ steps.env.outputs.env_name }} — refusing to silently skip"
          exit 1

      - name: Link Supabase project
        if: steps.env.outputs.project_ref != ''
        run: supabase link --project-ref "${{ steps.env.outputs.project_ref }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ steps.env.outputs.db_password }}

      - name: Run migrations
        if: steps.env.outputs.project_ref != ''
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ steps.env.outputs.db_password }}
